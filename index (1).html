<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honors History Hub — Grades 7 &amp; 8, U.S. and NYS History</title>
<style>
:root{
  --ink:#252233;
  --ink-soft:#5d5a6b;
  --paper:#f9f5ec;
  --card:#fffdf8;
  --line:#e6ddc9;
  --gold:#b98b2f;
  --gold-bright:#d4a63c;
  --gold-soft:#f3e9d0;
  --plum:#422a5e;
  --navy:#17203d;
  --wine:#713055;
  --grad-royal:linear-gradient(120deg,#17203d 0%,#2c2a55 45%,#422a5e 75%,#5d2c56 100%);
  --green:#2e6b4f;
  --green-soft:#e2efe8;
  --red:#a13a34;
  --red-soft:#f6e3e1;
  --radius:16px;
  --shadow:0 2px 8px rgba(34,28,58,.07),0 8px 24px rgba(34,28,58,.06);
  --shadow-lg:0 6px 16px rgba(34,28,58,.12),0 18px 44px rgba(34,28,58,.14);
  --acc:#3d5a8f; /* per-unit accent, overridden inline */
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:"Avenir Next","Segoe UI",system-ui,-apple-system,sans-serif;
  background:var(--paper);
  background-image:radial-gradient(rgba(60,45,90,.055) 1px, transparent 1.2px);
  background-size:26px 26px;
  color:var(--ink);
  font-size:17px;line-height:1.65;
  padding-bottom:80px;
}
h1,h2,h3,h4,.serif{font-family:Palatino,"Palatino Linotype","Book Antiqua",Georgia,serif;}
button{font:inherit;cursor:pointer;border:none;background:none;min-height:44px;color:inherit;}
a{color:var(--plum);}
:focus-visible{outline:3px solid var(--gold-bright);outline-offset:2px;border-radius:4px;}

/* ---------- Header ---------- */
header.site{
  position:sticky;top:0;z-index:60;
  background:var(--grad-royal);
  color:#fff;padding:12px 16px 12px;
  box-shadow:0 3px 18px rgba(23,32,61,.4);
  border-bottom:1px solid rgba(212,166,60,.55);
}
.head-inner{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.crest-mark{
  width:44px;height:44px;flex:0 0 44px;border:2px solid var(--gold-bright);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:Palatino,Georgia,serif;font-weight:700;font-size:15px;color:var(--gold-bright);
  background:rgba(255,255,255,.05);letter-spacing:.5px;box-shadow:inset 0 0 12px rgba(212,166,60,.15);
}
.head-titles{flex:1;min-width:200px;}
header.site h1{font-size:1.02rem;line-height:1.3;font-weight:700;letter-spacing:.01em;}
header.site .sub{font-size:.75rem;color:#c9c4dd;letter-spacing:.06em;}
/* Grade switcher */
.grade-switch{
  display:flex;background:rgba(255,255,255,.1);border:1px solid rgba(212,166,60,.5);
  border-radius:12px;padding:3px;gap:3px;
}
.grade-switch button{
  color:#d8d3e8;font-weight:700;font-size:.85rem;letter-spacing:.03em;
  padding:7px 16px;border-radius:9px;min-height:38px;transition:background .15s,color .15s;
}
.grade-switch button.on{
  background:linear-gradient(135deg,var(--gold-bright),var(--gold));
  color:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.grade-switch button:not(.on):hover{color:#fff;}

/* ---------- Tab bars ---------- */
nav.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:70;
  background:linear-gradient(180deg,#1c2547,#151d38);
  display:flex;justify-content:space-around;
  border-top:1px solid rgba(212,166,60,.4);
  padding:5px 3px calc(5px + env(safe-area-inset-bottom));
}
nav.tabs button{
  flex:1;color:#9aa2bd;font-size:.66rem;font-weight:700;letter-spacing:.02em;
  padding:6px 2px;display:flex;flex-direction:column;align-items:center;gap:3px;
  border-radius:10px;min-width:44px;transition:color .15s;
}
nav.tabs button .glyph{width:20px;height:20px;border:2px solid currentColor;border-radius:5px;display:block;position:relative;}
nav.tabs button.g-home .glyph{border-radius:5px 5px 3px 3px;}
nav.tabs button.g-units .glyph{border-radius:2px;}
nav.tabs button.g-units .glyph::after{content:"";position:absolute;left:3px;right:3px;top:4px;height:2px;background:currentColor;box-shadow:0 5px 0 currentColor;}
nav.tabs button.g-time .glyph{border-radius:50%;}
nav.tabs button.g-time .glyph::after{content:"";position:absolute;left:50%;top:3px;width:2px;height:7px;background:currentColor;transform:translateX(-50%);}
nav.tabs button.g-gloss .glyph::after{content:"A";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
nav.tabs button.g-skills .glyph{transform:rotate(45deg) scale(.85);}
nav.tabs button.g-quiz .glyph::after{content:"?";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
nav.tabs button.g-res .glyph{border-radius:50% 50% 4px 4px;}
nav.tabs button.active{color:var(--gold-bright);background:rgba(212,166,60,.14);}
nav.tabs button:hover{color:#fff;}

/* ---------- Layout ---------- */
main{max-width:1080px;margin:0 auto;padding:24px 16px 44px;}
section.view{display:none;}
section.view.active{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none !important;transition:none !important;}
  html{scroll-behavior:auto;}
}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:22px;margin-bottom:18px;
}
.eyebrow{font-size:.7rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-family:inherit;}
.view h2.page-title{font-size:1.7rem;color:var(--navy);margin-bottom:4px;letter-spacing:.01em;}
.page-intro{color:var(--ink-soft);margin-bottom:20px;max-width:660px;}

/* ---------- Hero / Home ---------- */
.hero{
  position:relative;overflow:hidden;
  background:var(--grad-royal);
  color:#fff;border-radius:20px;padding:34px 26px 30px;margin-bottom:20px;
  box-shadow:var(--shadow-lg);border:1px solid rgba(212,166,60,.35);
}
.hero::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(600px 220px at 85% -20%, rgba(212,166,60,.28), transparent 65%);
}
.hero .big-num{
  position:absolute;right:14px;bottom:-38px;font-family:Palatino,Georgia,serif;
  font-size:11rem;font-weight:700;color:rgba(212,166,60,.13);line-height:1;user-select:none;
}
.hero h2{font-size:1.65rem;margin-bottom:10px;line-height:1.25;position:relative;}
.hero p{color:#d9d5e8;max-width:620px;position:relative;}
.hero .rule{width:64px;height:3px;background:linear-gradient(90deg,var(--gold-bright),transparent);border-radius:2px;margin:16px 0 0;}
.howto ol{margin:8px 0 0 22px;}
.howto li{margin-bottom:9px;}
.progress-grid{display:grid;gap:13px;grid-template-columns:1fr;}
.prog-row{display:flex;align-items:center;gap:12px;}
.prog-row .lbl{flex:0 0 122px;font-weight:700;font-size:.88rem;color:var(--navy);}
.prog-bar{flex:1;height:13px;background:var(--gold-soft);border-radius:7px;overflow:hidden;border:1px solid var(--line);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));border-radius:7px;width:0;transition:width .5s ease;}
.prog-row .pct{flex:0 0 88px;text-align:right;font-size:.83rem;color:var(--ink-soft);font-weight:600;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#28325c,#1a2344);color:#fff;border-radius:12px;padding:11px 22px;
  font-weight:700;font-size:.95rem;transition:transform .12s, box-shadow .12s;min-height:46px;
  box-shadow:0 3px 10px rgba(23,32,61,.25);
}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(23,32,61,.3);}
.btn.gold{background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:var(--navy);}
.btn.ghost{background:transparent;color:var(--navy);border:2px solid var(--navy);box-shadow:none;}
.btn.ghost:hover{background:var(--navy);color:#fff;}
.btn.danger{background:transparent;color:var(--red);border:2px solid var(--red);box-shadow:none;}
.btn.danger:hover{background:var(--red);color:#fff;}

/* ---------- Search ---------- */
.search-wrap{position:relative;margin-bottom:20px;}
input.search{
  width:100%;padding:14px 18px;font:inherit;border:2px solid var(--line);
  border-radius:14px;background:var(--card);color:var(--ink);box-shadow:var(--shadow);
}
input.search:focus{border-color:var(--gold-bright);outline:none;}
.search-hint{font-size:.8rem;color:var(--ink-soft);margin-top:7px;}

/* ---------- Units (accent spine cards) ---------- */
.unit-card{overflow:hidden;padding:0;position:relative;border-left:6px solid var(--acc);}
.unit-head{width:100%;display:flex;align-items:center;gap:14px;text-align:left;padding:19px 20px;}
.unit-num{
  flex:0 0 50px;height:50px;border-radius:12px;
  background:linear-gradient(135deg,var(--acc),color-mix(in srgb,var(--acc) 70%,#000 30%));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:Palatino,Georgia,serif;font-size:1.35rem;font-weight:700;
  box-shadow:0 3px 8px color-mix(in srgb,var(--acc) 45%, transparent);
}
.unit-head .t{flex:1;}
.unit-head h3{font-size:1.12rem;color:var(--navy);line-height:1.35;}
.unit-head .years{font-size:.78rem;color:var(--acc);letter-spacing:.05em;font-weight:700;}
.chev{flex:0 0 14px;width:14px;height:14px;border-right:3px solid var(--acc);border-bottom:3px solid var(--acc);transform:rotate(45deg);transition:transform .2s;margin-top:-4px;}
.unit-card.open .chev{transform:rotate(-135deg);margin-top:6px;}
.unit-body{display:none;padding:0 20px 24px;border-top:1px solid var(--line);}
.unit-card.open .unit-body{display:block;}
.eq{
  background:color-mix(in srgb,var(--acc) 9%, #fff);border-left:4px solid var(--acc);
  border-radius:0 12px 12px 0;padding:13px 16px;margin:18px 0;
  font-family:Palatino,Georgia,serif;font-size:1.03rem;color:var(--navy);
}
.ub-sec{margin-top:20px;}
.ub-sec h4{font-size:.78rem;text-transform:uppercase;letter-spacing:.14em;color:var(--acc);font-family:inherit;font-weight:800;margin-bottom:8px;}
.term-list{list-style:none;}
.term-list li{padding:8px 0;border-bottom:1px dashed var(--line);}
.term-list li:last-child{border-bottom:none;}
.term-list b{color:var(--navy);}
.people-grid{display:grid;grid-template-columns:1fr;gap:9px;list-style:none;}
.people-grid li{background:color-mix(in srgb,var(--acc) 5%, var(--paper));border:1px solid var(--line);border-radius:11px;padding:10px 13px;font-size:.94rem;}
.people-grid b{color:var(--navy);display:block;}
.mini-tl{list-style:none;border-left:3px solid var(--acc);margin-left:6px;padding-left:17px;}
.mini-tl li{position:relative;padding:5px 0;}
.mini-tl li::before{content:"";position:absolute;left:-23px;top:14px;width:9px;height:9px;background:var(--acc);border-radius:50%;}
.mini-tl b{color:var(--navy);}
.matters{background:var(--green-soft);border-left:4px solid var(--green);border-radius:0 12px 12px 0;padding:12px 16px;margin-bottom:9px;font-size:.95rem;}
.hidden{display:none !important;}
mark{background:var(--gold-soft);color:inherit;border-radius:3px;padding:0 2px;box-shadow:inset 0 -2px 0 var(--gold-bright);}

/* ---------- Timeline ---------- */
.timeline{list-style:none;position:relative;margin-left:8px;border-left:3px solid #cfc6ae;padding-left:24px;}
.timeline li{position:relative;margin-bottom:19px;}
.timeline li::before{content:"";position:absolute;left:-32px;top:7px;width:13px;height:13px;border-radius:50%;background:var(--card);border:3px solid var(--acc);}
.tl-year{font-family:Palatino,Georgia,serif;font-weight:700;color:var(--navy);font-size:1.06rem;}
.tl-unit-tag{display:inline-block;font-size:.66rem;font-weight:800;letter-spacing:.08em;color:#fff;background:var(--acc);border-radius:6px;padding:2px 8px;margin-left:8px;vertical-align:middle;}
.tl-body{color:var(--ink);font-size:.95rem;}

/* ---------- Glossary + Flashcards ---------- */
.gloss-letter{font-family:Palatino,Georgia,serif;color:var(--gold);font-size:1.35rem;margin:20px 0 6px;border-bottom:2px solid var(--gold-soft);padding-bottom:2px;}
.gloss-item{padding:10px 0;border-bottom:1px dashed var(--line);}
.gloss-item b{color:var(--navy);}
.gloss-item .src{font-size:.74rem;color:var(--ink-soft);display:block;margin-top:2px;letter-spacing:.04em;}
.gloss-modes{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.flash-stage{perspective:1200px;margin:6px auto 16px;max-width:560px;}
.flash-card{
  position:relative;width:100%;min-height:230px;cursor:pointer;
  transform-style:preserve-3d;transition:transform .45s;border:none;display:block;text-align:center;
}
.flash-card.flipped{transform:rotateY(180deg);}
.flash-face{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:26px;box-shadow:var(--shadow-lg);
}
.flash-front{background:var(--grad-royal);color:#fff;border:1px solid rgba(212,166,60,.4);}
.flash-front .term{font-family:Palatino,Georgia,serif;font-size:1.6rem;line-height:1.25;}
.flash-front .tap{margin-top:14px;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-bright);font-weight:700;}
.flash-back{background:var(--card);border:2px solid var(--gold-bright);transform:rotateY(180deg);color:var(--ink);font-size:1.02rem;}
.flash-back .u{margin-top:12px;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:800;}
.flash-nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.flash-count{text-align:center;font-size:.85rem;color:var(--ink-soft);font-weight:700;margin-bottom:10px;}

/* ---------- Skills ---------- */
.skill-card h3{color:var(--navy);font-size:1.12rem;margin-bottom:6px;}
.try{background:var(--paper);border:1px dashed var(--gold);border-radius:12px;padding:13px 15px;margin-top:12px;font-size:.95rem;}
.try b{color:var(--gold);text-transform:uppercase;font-size:.72rem;letter-spacing:.1em;font-family:inherit;}

/* ---------- Quiz ---------- */
.quiz-setup .modes{display:grid;gap:11px;grid-template-columns:1fr;}
.mode-btn{
  text-align:left;background:var(--card);border:2px solid var(--line);border-radius:14px;
  padding:15px 17px;transition:border-color .15s,transform .12s,box-shadow .12s;width:100%;
}
.mode-btn:hover{border-color:var(--gold-bright);transform:translateY(-2px);box-shadow:var(--shadow);}
.mode-btn b{display:block;color:var(--navy);font-size:1.02rem;}
.mode-btn span{font-size:.85rem;color:var(--ink-soft);}
.q-progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.85rem;color:var(--ink-soft);font-weight:700;}
.q-track{height:9px;background:var(--gold-soft);border-radius:5px;overflow:hidden;margin-bottom:18px;border:1px solid var(--line);}
.q-track-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));width:0;transition:width .3s;}
.stimulus{
  background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--plum);
  border-radius:0 12px 12px 0;padding:15px 17px;margin-bottom:15px;
  font-family:Palatino,Georgia,serif;font-size:.99rem;
}
.stimulus .stype{font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;font-size:.68rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--plum);display:block;margin-bottom:6px;}
.q-text{font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:15px;}
.choices{display:grid;gap:11px;}
.choice{
  text-align:left;background:var(--card);border:2px solid var(--line);border-radius:12px;
  padding:12px 14px;width:100%;display:flex;gap:11px;align-items:flex-start;transition:border-color .12s;
}
.choice:hover{border-color:var(--plum);}
.choice .letter{flex:0 0 29px;height:29px;border-radius:50%;border:2px solid var(--plum);color:var(--plum);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;margin-top:1px;}
.choice.correct{border-color:var(--green);background:var(--green-soft);}
.choice.correct .letter{background:var(--green);border-color:var(--green);color:#fff;}
.choice.wrong{border-color:var(--red);background:var(--red-soft);}
.choice.wrong .letter{background:var(--red);border-color:var(--red);color:#fff;}
.choice:disabled{cursor:default;}
.feedback{border-radius:12px;padding:12px 15px;margin-top:15px;font-size:.95rem;display:none;}
.feedback.show{display:block;}
.feedback.good{background:var(--green-soft);border-left:4px solid var(--green);}
.feedback.bad{background:var(--red-soft);border-left:4px solid var(--red);}
.feedback b{display:block;margin-bottom:2px;}
.quiz-nav{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
.score-pill{background:var(--grad-royal);color:var(--gold-bright);border-radius:20px;padding:5px 15px;font-weight:800;font-size:.84rem;border:1px solid rgba(212,166,60,.5);}
.results-big{font-family:Palatino,Georgia,serif;font-size:2.6rem;color:var(--navy);}
.review-list{list-style:none;margin-top:10px;}
.review-list li{padding:9px 0;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;gap:10px;font-size:.95rem;}
.tag-good{color:var(--green);font-weight:800;}
.tag-warn{color:var(--red);font-weight:800;}
.crq-q .prompt{font-weight:700;color:var(--navy);margin-bottom:8px;}
.model{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 15px;margin-top:10px;font-size:.95rem;display:none;}
.model.show{display:block;}
.model b{color:var(--green);}
textarea.answer-box{width:100%;min-height:96px;font:inherit;font-size:.95rem;padding:11px 13px;border:2px solid var(--line);border-radius:12px;background:var(--card);resize:vertical;}
textarea.answer-box:focus{border-color:var(--gold-bright);outline:none;}
.disclaimer{font-size:.8rem;color:var(--ink-soft);border-top:1px solid var(--line);margin-top:18px;padding-top:12px;}

/* ---------- Resources ---------- */
.res-item{display:block;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--gold-bright);border-radius:13px;padding:14px 17px;margin-bottom:11px;text-decoration:none;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s;}
.res-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.res-item b{color:var(--navy);display:block;}
.res-item span{color:var(--ink-soft);font-size:.88rem;}

/* ---------- Desktop ---------- */
@media (min-width: 780px){
  body{padding-bottom:0;}
  nav.tabs{
    position:sticky;top:68px;bottom:auto;z-index:55;
    max-width:1080px;margin:0 auto;border-radius:0 0 16px 16px;
    border-top:none;box-shadow:var(--shadow);padding:6px;
  }
  nav.tabs button{flex-direction:row;font-size:.86rem;gap:8px;padding:10px 6px;border-radius:10px;}
  nav.tabs button .glyph{width:15px;height:15px;}
  nav.tabs button.g-gloss .glyph::after,nav.tabs button.g-quiz .glyph::after{font-size:9px;}
  header.site h1{font-size:1.22rem;}
  .hero h2{font-size:2rem;}
  main{padding-top:30px;}
  .quiz-setup .modes{grid-template-columns:1fr 1fr;}
  .people-grid{grid-template-columns:1fr 1fr;}
  .unit-head h3{font-size:1.2rem;}
}
@media (min-width: 1010px){ .quiz-setup .modes{grid-template-columns:1fr 1fr 1fr;} }
</style>
</head>
<body>

<header class="site">
  <div class="head-inner">
    <div class="crest-mark" aria-hidden="true" id="crest">7H</div>
    <div class="head-titles">
      <h1 id="siteTitle">Grade 7 Honors — United States and New York State History</h1>
      <div class="sub">NYCDOE Social Studies Scope &amp; Sequence</div>
    </div>
    <div class="grade-switch" role="tablist" aria-label="Choose grade">
      <button id="gbtn7" class="on" role="tab" aria-selected="true" onclick="setGrade('g7')">Grade 7</button>
      <button id="gbtn8" role="tab" aria-selected="false" onclick="setGrade('g8')">Grade 8</button>
    </div>
  </div>
</header>

<nav class="tabs" role="tablist" aria-label="Main sections">
  <button class="g-home active" role="tab" aria-selected="true" data-view="home"><span class="glyph" aria-hidden="true"></span>Home</button>
  <button class="g-units" role="tab" aria-selected="false" data-view="units"><span class="glyph" aria-hidden="true"></span>Units</button>
  <button class="g-time" role="tab" aria-selected="false" data-view="timeline"><span class="glyph" aria-hidden="true"></span>Timeline</button>
  <button class="g-gloss" role="tab" aria-selected="false" data-view="glossary"><span class="glyph" aria-hidden="true"></span>Glossary</button>
  <button class="g-skills" role="tab" aria-selected="false" data-view="skills"><span class="glyph" aria-hidden="true"></span>Skills</button>
  <button class="g-quiz" role="tab" aria-selected="false" data-view="quiz"><span class="glyph" aria-hidden="true"></span>Practice</button>
  <button class="g-res" role="tab" aria-selected="false" data-view="resources"><span class="glyph" aria-hidden="true"></span>Resources</button>

function toggleUnit(btn){
  const card = btn.closest(".unit-card");
  const open = card.classList.toggle("open");
  btn.setAttribute("aria-expanded", open ? "true" : "false");
}
function filterUnits(q){
  q = q.trim().toLowerCase();
  const cards = $$("#view-units .unit-card");
  let hits = 0;
  const re = q ? new RegExp("(?![^<]*>)("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi") : null;
  cards.forEach(card => {
    const items = $$(".searchable", card);
    let cardHit = false;
    items.forEach(el => {
      if(el.dataset.orig === undefined) el.dataset.orig = el.innerHTML;
      if(!q){ el.classList.remove("hidden"); el.innerHTML = el.dataset.orig; return; }
      const match = el.textContent.toLowerCase().includes(q);
      el.classList.toggle("hidden", !match);
      el.innerHTML = match ? el.dataset.orig.replace(re, "<mark>$1</mark>") : el.dataset.orig;
      if(match) cardHit = true;
    });
    card.classList.toggle("hidden", q ? !cardHit : false);
    card.classList.toggle("open", q ? cardHit : false);
    $(".unit-head",card).setAttribute("aria-expanded", (q && cardHit) ? "true" : "false");
    if(cardHit) hits++;
  });
  $("#unitSearchHint").textContent = q ? (hits ? hits+" unit(s) contain matches." : "No matches \u2014 check your spelling or try a shorter word.") : "Searching opens matching units automatically.";
}

let glossMode = "list";
let flash = null; /* {deck, idx, flipped} */
function allTerms(){
  const all = [];
  D().units.forEach(u => u.keyTerms.forEach(t => all.push({term:t[0], def:t[1], unit:u.id})));
  return all;
}
function renderGlossary(filter=""){
  if(glossMode === "cards"){ renderFlashcards(); return; }
  const all = allTerms().sort((a,b)=>a.term.toLowerCase().localeCompare(b.term.toLowerCase()));
  const q = filter.trim().toLowerCase();
  const shown = q ? all.filter(t => (t.term+" "+t.def).toLowerCase().includes(q)) : all;
  let html = "", letter = "";
  shown.forEach(t => {
    const L = t.term[0].toUpperCase();
    if(L !== letter && !q){ letter = L; html += `<div class="gloss-letter">${L}</div>`; }
    html += `<div class="gloss-item"><b>${esc(t.term)}</b> \u2014 ${esc(t.def)}<span class="src">Unit ${t.unit}</span></div>`;
  });
  $("#view-glossary").innerHTML = `
    <h2 class="page-title">Grade ${D().num} Glossary</h2>
    <p class="page-intro">Every vocabulary word from all five units, A to Z \u2014 ${all.length} terms. Switch to Flashcards for quick daily practice.</p>
    <div class="gloss-modes">
      <button class="btn gold" aria-pressed="true">Word list</button>
      <button class="btn ghost" onclick="startFlash()" aria-pressed="false">Flashcards</button>
    </div>
    <div class="search-wrap">
      <label for="glossSearch" class="hidden">Search glossary</label>
      <input class="search" id="glossSearch" type="search" placeholder="Search ${all.length} terms..." value="${esc(filter)}" oninput="renderGlossary(this.value)">
    </div>
    <div class="card">${html || "<p>No terms match that search.</p>"}</div>`;
  if(filter){ const inp = $("#glossSearch"); inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}
function startFlash(){
  glossMode = "cards";
  const deck = allTerms();
  for(let i=deck.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
  flash = {deck, idx:0, flipped:false};
  renderFlashcards();
}
function renderFlashcards(){
  const t = flash.deck[flash.idx];
  $("#view-glossary").innerHTML = `
    <h2 class="page-title">Flashcards \u2014 Grade ${D().num}</h2>
    <p class="page-intro">Tap the card to flip it. Say the definition out loud before you flip \u2014 retrieval is what makes it stick.</p>
    <div class="gloss-modes">
      <button class="btn ghost" onclick="glossMode='list';renderGlossary()" aria-pressed="false">Word list</button>
      <button class="btn gold" aria-pressed="true">Flashcards</button>
    </div>
    <div class="flash-count">Card ${flash.idx+1} of ${flash.deck.length}</div>
    <div class="flash-stage">
      <button class="flash-card${flash.flipped ? " flipped":""}" onclick="flipFlash()" aria-label="Flashcard: ${esc(t.term)}. Activate to flip.">
        <span class="flash-face flash-front"><span class="term">${esc(t.term)}</span><span class="tap">Tap to flip</span></span>
        <span class="flash-face flash-back"><span>${esc(t.def)}</span><span class="u">Unit ${t.unit}</span></span>
      </button>
    </div>
    <div class="flash-nav">
      <button class="btn ghost" onclick="moveFlash(-1)">Previous</button>
      <button class="btn" onclick="flipFlash()">Flip</button>
      <button class="btn ghost" onclick="moveFlash(1)">Next</button>
      <button class="btn gold" onclick="startFlash()">Shuffle deck</button>
    </div>`;
}
function flipFlash(){ flash.flipped = !flash.flipped; renderFlashcards(); }
function moveFlash(dir){
  flash.idx = (flash.idx + dir + flash.deck.length) % flash.deck.length;
  flash.flipped = false;
  renderFlashcards();
}

/* ---------- QUIZ ENGINE ---------- */
let quiz = null;
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function buildQuiz(mode){
  const Q = D().questions;
  let qs = [], label = "";
  if(mode === "random"){
    label = "Random Mix (20 questions)";
    qs = shuffle(Q).slice(0,20);
  } else if(mode === "final"){
    label = "Practice Final (25 questions)";
    for(let u=1;u<=5;u++) qs = qs.concat(shuffle(Q.filter(q=>q.u===u)).slice(0,5));
    qs = shuffle(qs);
  } else {
    const u = parseInt(mode.replace("unit",""),10);
    label = "Unit "+u+" Quiz ("+Q.filter(q=>q.u===u).length+" questions)";
    qs = shuffle(Q.filter(q=>q.u===u));
  }
  /* Shuffle each question's answer choices so the correct letter varies
     every attempt (prevents pattern-guessing and position memorization). */
  qs = qs.map(q => {
    const order = shuffle([0,1,2,3]);
    return Object.assign({}, q, {_order: order, _a: order.indexOf(q.a)});
  });
  quiz = {mode, label, questions:qs, index:0, correct:0, perUnit:{}};
  renderQuizQuestion();
}
function renderQuizSetup(){
  const modes = P().modes;
  const unitModes = D().units.map(u=>{
    const m = modes["unit"+u.id];
    return `<button class="mode-btn" style="border-left:5px solid ${u.acc}" onclick="buildQuiz('unit${u.id}')">
      <b>Unit ${u.id} Quiz</b><span>${esc(u.title)}${m ? " \u2014 best "+Math.round(100*m.best.correct/m.best.total)+"%" : ""}</span></button>`;
  }).join("");
  const fin = modes["final"], rnd = modes["random"];
  const crqHtml = D().crqs.map((c,i)=>`
    <div class="card crq-q">
      <div class="eyebrow">Constructed Response \u2014 Unit ${c.u}</div>
      <div class="prompt">${esc(c.prompt)}</div>
      <label class="hidden" for="crq${i}">Your answer</label>
      <textarea class="answer-box" id="crq${i}" placeholder="Write your answer here (2-5 sentences), then compare with the model."></textarea>
      <div class="quiz-nav">
        <button class="btn ghost" onclick="document.getElementById('model${i}').classList.toggle('show')">Show / hide model answer</button>
      </div>
      <div class="model" id="model${i}"><b>Model answer:</b> ${esc(c.model)}</div>
    </div>`).join("");
  const dbqHtml = D().dbqs.map((d,i)=>`
    <div class="card crq-q">
      <div class="eyebrow">DBQ Practice \u2014 Unit ${d.u}</div>
      <div class="stimulus"><span class="stype">${esc(d.docTitle)}</span>${esc(d.doc)}</div>
      <ol style="margin:0 0 10px 20px">${d.scaffold.map(s=>`<li style="margin-bottom:6px">${esc(s)}</li>`).join("")}</ol>
      <label class="hidden" for="dbq${i}">Your DBQ response</label>
      <textarea class="answer-box" id="dbq${i}" placeholder="Answer the scaffolded questions, then write a short response using the document AND your outside knowledge."></textarea>
      <div class="quiz-nav">
        <button class="btn ghost" onclick="document.getElementById('dmodel${i}').classList.toggle('show')">Show / hide model response</button>
      </div>
      <div class="model" id="dmodel${i}"><b>Model response:</b> ${esc(d.model)}</div>
    </div>`).join("");
  $("#view-quiz").innerHTML = `
    <h2 class="page-title">Grade ${D().num} Practice &amp; Tests</h2>
    <p class="page-intro">Instant feedback on every question, with an explanation whether you are right or wrong. Scores save automatically on this device \u2014 separately for each grade.</p>
    <div class="quiz-setup">
      <div class="card">
        <div class="eyebrow">Choose a quiz</div>
        <div class="modes">
          ${unitModes}
          <button class="mode-btn" onclick="buildQuiz('random')"><b>Random Mix</b><span>20 questions from all units${rnd ? " \u2014 best "+Math.round(100*rnd.best.correct/rnd.best.total)+"%" : ""}</span></button>
          <button class="mode-btn" onclick="buildQuiz('final')"><b>Practice Final</b><span>25 mixed questions, 5 from each unit${fin ? " \u2014 best "+Math.round(100*fin.best.correct/fin.best.total)+"%" : ""}</span></button>
        </div>
        <div class="quiz-nav"><button class="btn danger" onclick="resetProgress()">Reset saved progress for Grade ${D().num}</button></div>
      </div>
      <h2 class="page-title" style="margin-top:24px">Short Answer Practice</h2>
      <p class="page-intro">Write first, then reveal the model. Comparing your answer to a model is one of the fastest ways to improve.</p>
      ${crqHtml}
      <h2 class="page-title" style="margin-top:24px">DBQ Practice</h2>
      <p class="page-intro">One document set per unit. Use the "How to Attack a DBQ" guide in the Skills tab first.</p>
      ${dbqHtml}
      <p class="disclaimer">Note: All questions in this app were written originally for study practice in the style of New York State Regents-format assessments. There is no separate statewide Grade 7 or Grade 8 Regents exam in social studies; these questions mirror the stimulus-based multiple choice, constructed-response, and DBQ formats students will encounter on later NYS assessments.</p>
    </div>`;
}
function renderQuizQuestion(){
  const q = quiz.questions[quiz.index];
  const stim = q.stim ? `<div class="stimulus"><span class="stype">${esc(q.stim.kind)}</span>${esc(q.stim.text)}</div>` : "";
  $("#view-quiz").innerHTML = `
    <div class="q-progress">
      <span>${esc(quiz.label)}</span>
      <span class="score-pill">Score: ${quiz.correct} / ${quiz.index}</span>
    </div>
    <div class="q-track"><div class="q-track-fill" style="width:${Math.round(100*quiz.index/quiz.questions.length)}%"></div></div>
    <div class="card">
      <div class="eyebrow">Question ${quiz.index+1} of ${quiz.questions.length} \u2014 Unit ${q.u}</div>
      ${stim}
      <div class="q-text">${esc(q.q)}</div>
      <div class="choices">
        ${q._order.map((ci,i)=>`<button class="choice" data-i="${i}" onclick="answer(${i})"><span class="letter">${["A","B","C","D"][i]}</span><span>${esc(q.c[ci])}</span></button>`).join("")}
      </div>
      <div class="feedback" id="fb" role="status"></div>
      <div class="quiz-nav">
        <button class="btn hidden" id="nextBtn" onclick="nextQ()">Next question</button>
        <button class="btn ghost" onclick="quitQuiz()">Quit quiz</button>
      </div>
    </div>`;
}
function answer(i){
  const q = quiz.questions[quiz.index];
  const btns = $$("#view-quiz .choice");
  if(btns[0].disabled) return;
  btns.forEach(b=>b.disabled = true);
  const right = i === q._a;
  btns[q._a].classList.add("correct");
  if(!right) btns[i].classList.add("wrong");
  if(right) quiz.correct++;
  quiz.perUnit[q.u] = quiz.perUnit[q.u] || {correct:0,total:0};
  quiz.perUnit[q.u].total++; if(right) quiz.perUnit[q.u].correct++;
  const fb = $("#fb");
  fb.className = "feedback show " + (right ? "good" : "bad");
  fb.innerHTML = `<b>${right ? "Correct." : "Not quite \u2014 the answer is "+["A","B","C","D"][q._a]+"."}</b>${esc(q.ex)}`;
  $(".score-pill").textContent = "Score: "+quiz.correct+" / "+(quiz.index+1);
  const nb = $("#nextBtn");
  nb.classList.remove("hidden");
  nb.textContent = quiz.index+1 < quiz.questions.length ? "Next question" : "See results";
  nb.focus();
}
function nextQ(){
  quiz.index++;
  if(quiz.index < quiz.questions.length) renderQuizQuestion();
  else finishQuiz();
}
function quitQuiz(){ quiz = null; renderQuizSetup(); }
function finishQuiz(){
  const total = quiz.questions.length, correct = quiz.correct;
  const pct = Math.round(100*correct/total);
  const modes = P().modes;
  const m = modes[quiz.mode] || {attempts:0, best:{correct:0,total:total}};
  m.attempts++;
  if(correct/total >= (m.best.correct/m.best.total || 0)) m.best = {correct, total};
  m.last = {correct, total};
  modes[quiz.mode] = m;
  Object.keys(quiz.perUnit).forEach(u=>{
    const s = P().unitStats[u] || {correct:0,total:0};
    s.correct += quiz.perUnit[u].correct; s.total += quiz.perUnit[u].total;
    P().unitStats[u] = s;
  });
  saveStore();
  const review = D().units.filter(u=>quiz.perUnit[u.id]).map(u=>{
    const s = quiz.perUnit[u.id], p = Math.round(100*s.correct/s.total);
    const ok = p >= 70;
    return `<li><span style="border-left:4px solid ${u.acc};padding-left:8px">Unit ${u.id}: ${esc(u.title)}</span><span class="${ok?"tag-good":"tag-warn"}">${s.correct}/${s.total}${ok?"":" \u2014 review this unit"}</span></li>`;
  }).join("");
  const verdict = pct >= 90 ? "Outstanding \u2014 honors-level mastery." : pct >= 80 ? "Strong work. Polish the topics below and you are exam-ready." : pct >= 70 ? "Solid foundation. Focus your review on the flagged units." : "Good start \u2014 reread the flagged units' Big Picture and Key Terms, then try again.";
  $("#view-quiz").innerHTML = `
    <div class="card" style="text-align:center;padding:34px 20px">
      <div class="eyebrow">${esc(quiz.label)} \u2014 Results</div>
      <div class="results-big">${correct} / ${total}</div>
      <p style="font-size:1.35rem;color:var(--gold);font-weight:700;font-family:Palatino,Georgia,serif">${pct}%</p>
      <p style="max-width:540px;margin:8px auto 0">${verdict}</p>
    </div>
    <div class="card">
      <div class="eyebrow">Breakdown by unit</div>
      <ul class="review-list">${review}</ul>
      <div class="quiz-nav">
        <button class="btn gold" onclick="buildQuiz('${quiz.mode}')">Try again</button>
        <button class="btn" onclick="quitQuiz()">Back to Practice menu</button>
        <button class="btn ghost" onclick="showView('units')">Review the Units</button>
      </div>
    </div>`;
}
function resetProgress(){
  if(confirm("Erase all saved scores and progress for Grade "+D().num+" on this device?")){
    store[grade] = {modes:{}, unitStats:{}};
    saveStore();
    renderQuizSetup();
  }
}

/* ---------- Boot ---------- */
function renderAll(){
  renderHome();
  renderUnits();
  renderTimeline();
  glossMode = "list";
  renderGlossary();
  renderSkills();
  renderQuizSetup();
  renderResources();
}
setGrade(grade);
</script>
