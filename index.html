<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 7 Honors — U.S. and NYS History Study Hub</title>
<style>
:root{
  --navy:#1d2d44;
  --navy-deep:#14213a;
  --slate:#3e5c76;
  --parchment:#f7f3ea;
  --card:#fffdf8;
  --gold:#b98b2f;
  --gold-soft:#f0e6cf;
  --ink:#22242a;
  --ink-soft:#5a5e68;
  --line:#e3dccb;
  --green:#2e6b4f;
  --green-soft:#e2efe8;
  --red:#a13a34;
  --red-soft:#f6e3e1;
  --radius:14px;
  --shadow:0 2px 10px rgba(29,45,68,.08);
  --shadow-lg:0 8px 26px rgba(29,45,68,.14);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:"Avenir Next","Segoe UI",system-ui,-apple-system,sans-serif;
  background:var(--parchment);
  color:var(--ink);
  font-size:17px;
  line-height:1.6;
  padding-bottom:76px; /* room for mobile tab bar */
}
h1,h2,h3,h4,.serif{font-family:Georgia,"Iowan Old Style","Times New Roman",serif;}
button{font:inherit;cursor:pointer;border:none;background:none;min-height:44px;}
a{color:var(--slate);}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:4px;}

/* ---------- Header ---------- */
header.site{
  position:sticky;top:0;z-index:60;
  background:var(--navy);
  color:#fff;
  padding:14px 18px 12px;
  box-shadow:0 2px 12px rgba(20,33,58,.35);
}
header.site .crest{
  display:flex;align-items:center;gap:12px;max-width:1060px;margin:0 auto;
}
.crest-mark{
  width:40px;height:40px;flex:0 0 40px;border:2px solid var(--gold);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;font-weight:700;font-size:17px;color:var(--gold);
  background:rgba(255,255,255,.04);letter-spacing:.5px;
}
header.site h1{font-size:1.05rem;line-height:1.3;font-weight:600;}
header.site .sub{font-size:.78rem;color:#c7d0de;letter-spacing:.04em;}

/* ---------- Tab bars ---------- */
nav.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:70;
  background:var(--navy-deep);
  display:flex;justify-content:space-around;
  border-top:1px solid rgba(255,255,255,.12);
  padding:4px 2px calc(4px + env(safe-area-inset-bottom));
}
nav.tabs button{
  flex:1;color:#aeb9ca;font-size:.68rem;font-weight:600;letter-spacing:.02em;
  padding:6px 2px;display:flex;flex-direction:column;align-items:center;gap:3px;
  border-radius:8px;min-width:44px;
}
nav.tabs button .glyph{
  width:20px;height:20px;border:2px solid currentColor;border-radius:5px;
  display:block;position:relative;
}
nav.tabs button.g-home .glyph{border-radius:5px 5px 3px 3px;}
nav.tabs button.g-units .glyph{border-radius:2px;}
nav.tabs button.g-units .glyph::after{content:"";position:absolute;left:3px;right:3px;top:4px;height:2px;background:currentColor;box-shadow:0 5px 0 currentColor;}
nav.tabs button.g-time .glyph{border-radius:50%;}
nav.tabs button.g-time .glyph::after{content:"";position:absolute;left:50%;top:3px;width:2px;height:7px;background:currentColor;transform:translateX(-50%);}
nav.tabs button.g-gloss .glyph::after{content:"A";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:none;}
nav.tabs button.g-skills .glyph{transform:rotate(45deg) scale(.85);}
nav.tabs button.g-quiz .glyph::after{content:"?";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
nav.tabs button.g-res .glyph{border-radius:50% 50% 4px 4px;}
nav.tabs button.active{color:var(--gold);background:rgba(185,139,47,.12);}
nav.tabs button:hover{color:#fff;}

/* ---------- Layout ---------- */
main{max-width:1060px;margin:0 auto;padding:22px 16px 40px;}
section.view{display:none;}
section.view.active{display:block;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none !important;transition:none !important;}
  html{scroll-behavior:auto;}
}

.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:20px;margin-bottom:16px;
}
.eyebrow{
  font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);margin-bottom:6px;font-family:inherit;
}
.view h2.page-title{font-size:1.6rem;color:var(--navy);margin-bottom:4px;}
.page-intro{color:var(--ink-soft);margin-bottom:18px;max-width:640px;}

/* ---------- Home ---------- */
.hero{
  background:linear-gradient(135deg,var(--navy) 0%,var(--slate) 100%);
  color:#fff;border-radius:var(--radius);padding:26px 22px;margin-bottom:18px;
  box-shadow:var(--shadow-lg);
}
.hero h2{font-size:1.5rem;margin-bottom:8px;}
.hero p{color:#dbe2ec;max-width:600px;}
.hero .rule{width:56px;height:3px;background:var(--gold);border-radius:2px;margin:12px 0 0;}
.howto ol{margin:8px 0 0 22px;}
.howto li{margin-bottom:8px;}
.progress-grid{display:grid;gap:12px;grid-template-columns:1fr;}
.prog-row{display:flex;align-items:center;gap:12px;}
.prog-row .lbl{flex:0 0 118px;font-weight:600;font-size:.9rem;color:var(--navy);}
.prog-bar{flex:1;height:12px;background:var(--gold-soft);border-radius:6px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);border-radius:6px;width:0;transition:width .4s ease;}
.prog-row .pct{flex:0 0 84px;text-align:right;font-size:.85rem;color:var(--ink-soft);}
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--navy);color:#fff;border-radius:10px;padding:10px 20px;
  font-weight:600;font-size:.95rem;transition:background .15s;min-height:44px;
}
.btn:hover{background:var(--slate);}
.btn.gold{background:var(--gold);color:var(--navy-deep);}
.btn.gold:hover{background:#a97e28;}
.btn.ghost{background:transparent;color:var(--navy);border:2px solid var(--navy);}
.btn.ghost:hover{background:var(--navy);color:#fff;}
.btn.danger{background:transparent;color:var(--red);border:2px solid var(--red);}
.btn.danger:hover{background:var(--red);color:#fff;}

/* ---------- Search ---------- */
.search-wrap{position:relative;margin-bottom:18px;}
input.search{
  width:100%;padding:13px 16px;font:inherit;border:2px solid var(--line);
  border-radius:12px;background:var(--card);color:var(--ink);
}
input.search:focus{border-color:var(--gold);outline:none;}
.search-hint{font-size:.8rem;color:var(--ink-soft);margin-top:6px;}

/* ---------- Units ---------- */
.unit-card{overflow:hidden;padding:0;}
.unit-head{
  width:100%;display:flex;align-items:center;gap:14px;text-align:left;
  padding:18px 20px;background:none;
}
.unit-num{
  flex:0 0 46px;height:46px;border-radius:10px;background:var(--navy);color:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;font-size:1.25rem;font-weight:700;
}
.unit-head .t{flex:1;}
.unit-head h3{font-size:1.08rem;color:var(--navy);line-height:1.35;}
.unit-head .years{font-size:.78rem;color:var(--ink-soft);letter-spacing:.04em;}
.chev{
  flex:0 0 14px;width:14px;height:14px;border-right:3px solid var(--slate);
  border-bottom:3px solid var(--slate);transform:rotate(45deg);transition:transform .2s;margin-top:-4px;
}
.unit-card.open .chev{transform:rotate(-135deg);margin-top:6px;}
.unit-body{display:none;padding:0 20px 22px;border-top:1px solid var(--line);}
.unit-card.open .unit-body{display:block;}
.eq{
  background:var(--gold-soft);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;
  padding:12px 16px;margin:16px 0;font-family:Georgia,serif;font-size:1.02rem;color:var(--navy);
}
.ub-sec{margin-top:18px;}
.ub-sec h4{font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);font-family:inherit;font-weight:700;margin-bottom:8px;}
.term-list{list-style:none;}
.term-list li{padding:8px 0;border-bottom:1px dashed var(--line);}
.term-list li:last-child{border-bottom:none;}
.term-list b{color:var(--navy);}
.people-grid{display:grid;grid-template-columns:1fr;gap:8px;list-style:none;}
.people-grid li{background:var(--parchment);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:.94rem;}
.people-grid b{color:var(--navy);display:block;}
.mini-tl{list-style:none;border-left:3px solid var(--gold);margin-left:6px;padding-left:16px;}
.mini-tl li{position:relative;padding:5px 0;}
.mini-tl li::before{content:"";position:absolute;left:-22px;top:14px;width:9px;height:9px;background:var(--gold);border-radius:50%;}
.mini-tl b{color:var(--navy);}
.matters{background:var(--green-soft);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:8px;font-size:.95rem;}
.hidden{display:none !important;}
mark{background:var(--gold-soft);color:inherit;border-radius:3px;padding:0 2px;}

/* ---------- Timeline page ---------- */
.timeline{list-style:none;position:relative;margin-left:8px;border-left:3px solid var(--slate);padding-left:22px;}
.timeline li{position:relative;margin-bottom:18px;}
.timeline li::before{content:"";position:absolute;left:-30px;top:8px;width:13px;height:13px;border-radius:50%;background:var(--card);border:3px solid var(--gold);}
.tl-year{font-family:Georgia,serif;font-weight:700;color:var(--navy);font-size:1.05rem;}
.tl-unit-tag{display:inline-block;font-size:.68rem;font-weight:700;letter-spacing:.08em;color:#fff;background:var(--slate);border-radius:5px;padding:2px 7px;margin-left:8px;vertical-align:middle;}
.tl-body{color:var(--ink);font-size:.95rem;}

/* ---------- Glossary ---------- */
.gloss-letter{font-family:Georgia,serif;color:var(--gold);font-size:1.3rem;margin:18px 0 6px;border-bottom:2px solid var(--gold-soft);padding-bottom:2px;}
.gloss-item{padding:10px 0;border-bottom:1px dashed var(--line);}
.gloss-item b{color:var(--navy);}
.gloss-item .src{font-size:.75rem;color:var(--ink-soft);display:block;margin-top:2px;letter-spacing:.03em;}

/* ---------- Skills ---------- */
.skill-card h3{color:var(--navy);font-size:1.1rem;margin-bottom:6px;}
.try{
  background:var(--parchment);border:1px dashed var(--gold);border-radius:10px;
  padding:12px 14px;margin-top:10px;font-size:.95rem;
}
.try b{color:var(--gold);text-transform:uppercase;font-size:.72rem;letter-spacing:.1em;font-family:inherit;}

/* ---------- Quiz ---------- */
.quiz-setup .modes{display:grid;gap:10px;grid-template-columns:1fr;}
.mode-btn{
  text-align:left;background:var(--card);border:2px solid var(--line);border-radius:12px;
  padding:14px 16px;transition:border-color .15s,transform .1s;width:100%;
}
.mode-btn:hover{border-color:var(--gold);transform:translateY(-1px);}
.mode-btn b{display:block;color:var(--navy);font-size:1rem;}
.mode-btn span{font-size:.85rem;color:var(--ink-soft);}
.q-progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.85rem;color:var(--ink-soft);font-weight:600;}
.q-track{height:8px;background:var(--gold-soft);border-radius:4px;overflow:hidden;margin-bottom:18px;}
.q-track-fill{height:100%;background:var(--gold);width:0;transition:width .3s;}
.stimulus{
  background:var(--parchment);border:1px solid var(--line);border-left:4px solid var(--slate);
  border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:14px;
  font-family:Georgia,serif;font-size:.98rem;
}
.stimulus .stype{font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);display:block;margin-bottom:6px;}
.q-text{font-size:1.08rem;font-weight:600;color:var(--navy);margin-bottom:14px;}
.choices{display:grid;gap:10px;}
.choice{
  text-align:left;background:var(--card);border:2px solid var(--line);border-radius:10px;
  padding:12px 14px;width:100%;display:flex;gap:10px;align-items:flex-start;transition:border-color .12s;
}
.choice:hover{border-color:var(--slate);}
.choice .letter{
  flex:0 0 28px;height:28px;border-radius:50%;border:2px solid var(--slate);color:var(--slate);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;margin-top:1px;
}
.choice.correct{border-color:var(--green);background:var(--green-soft);}
.choice.correct .letter{background:var(--green);border-color:var(--green);color:#fff;}
.choice.wrong{border-color:var(--red);background:var(--red-soft);}
.choice.wrong .letter{background:var(--red);border-color:var(--red);color:#fff;}
.choice:disabled{cursor:default;}
.feedback{border-radius:10px;padding:12px 15px;margin-top:14px;font-size:.95rem;display:none;}
.feedback.show{display:block;}
.feedback.good{background:var(--green-soft);border-left:4px solid var(--green);}
.feedback.bad{background:var(--red-soft);border-left:4px solid var(--red);}
.feedback b{display:block;margin-bottom:2px;}
.quiz-nav{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
.score-pill{background:var(--navy);color:var(--gold);border-radius:20px;padding:4px 14px;font-weight:700;font-size:.85rem;}
.results-big{font-family:Georgia,serif;font-size:2.4rem;color:var(--navy);}
.review-list{list-style:none;margin-top:10px;}
.review-list li{padding:8px 0;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;gap:10px;font-size:.95rem;}
.tag-good{color:var(--green);font-weight:700;}
.tag-warn{color:var(--red);font-weight:700;}
.crq-q{margin-bottom:14px;}
.crq-q .prompt{font-weight:600;color:var(--navy);margin-bottom:8px;}
.model{background:var(--parchment);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:8px;font-size:.95rem;display:none;}
.model.show{display:block;}
.model b{color:var(--green);}
textarea.answer-box{
  width:100%;min-height:96px;font:inherit;font-size:.95rem;padding:10px 12px;
  border:2px solid var(--line);border-radius:10px;background:var(--card);resize:vertical;
}
textarea.answer-box:focus{border-color:var(--gold);outline:none;}
.disclaimer{font-size:.8rem;color:var(--ink-soft);border-top:1px solid var(--line);margin-top:16px;padding-top:12px;}

/* ---------- Resources ---------- */
.res-item{display:block;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;text-decoration:none;box-shadow:var(--shadow);transition:transform .1s,border-color .15s;}
.res-item:hover{transform:translateY(-1px);border-color:var(--gold);}
.res-item b{color:var(--navy);display:block;}
.res-item span{color:var(--ink-soft);font-size:.88rem;}

/* ---------- Desktop ---------- */
@media (min-width: 760px){
  body{padding-bottom:0;font-size:17px;}
  nav.tabs{
    position:sticky;top:64px;bottom:auto;z-index:55;
    max-width:1060px;margin:0 auto;border-radius:0 0 14px 14px;
    border-top:none;box-shadow:var(--shadow);padding:6px;
  }
  nav.tabs button{flex-direction:row;font-size:.85rem;gap:8px;padding:9px 6px;border-radius:9px;}
  nav.tabs button .glyph{width:15px;height:15px;border-width:2px;}
  nav.tabs button.g-gloss .glyph::after{font-size:9px;}
  nav.tabs button.g-quiz .glyph::after{font-size:9px;}
  header.site h1{font-size:1.25rem;}
  main{padding-top:28px;}
  .quiz-setup .modes{grid-template-columns:1fr 1fr;}
  .people-grid{grid-template-columns:1fr 1fr;}
  .progress-grid{grid-template-columns:1fr;}
  .unit-head h3{font-size:1.18rem;}
}
@media (min-width: 1000px){
  .quiz-setup .modes{grid-template-columns:1fr 1fr 1fr;}
}
</style>
</head>
<body>

<header class="site">
  <div class="crest">
    <div class="crest-mark" aria-hidden="true">7H</div>
    <div>
      <h1>Grade 7 Honors — United States and New York State History</h1>
      <div class="sub">NYCDOE Social Studies Scope &amp; Sequence</div>
    </div>
  </div>
</header>

<nav class="tabs" role="tablist" aria-label="Main sections">
  <button class="g-home active" role="tab" aria-selected="true" data-view="home"><span class="glyph" aria-hidden="true"></span>Home</button>
  <button class="g-units" role="tab" aria-selected="false" data-view="units"><span class="glyph" aria-hidden="true"></span>Units</button>
  <button class="g-time" role="tab" aria-selected="false" data-view="timeline"><span class="glyph" aria-hidden="true"></span>Timeline</button>
  <button class="g-gloss" role="tab" aria-selected="false" data-view="glossary"><span class="glyph" aria-hidden="true"></span>Glossary</button>
  <button class="g-skills" role="tab" aria-selected="false" data-view="skills"><span class="glyph" aria-hidden="true"></span>Skills</button>
  <button class="g-quiz" role="tab" aria-selected="false" data-view="quiz"><span class="glyph" aria-hidden="true"></span>Practice</button>
  <button class="g-res" role="tab" aria-selected="false" data-view="resources"><span class="glyph" aria-hidden="true"></span>Resources</button>
</nav>

<main>
  <section id="view-home" class="view active" role="tabpanel" aria-label="Home"></section>
  <section id="view-units" class="view" role="tabpanel" aria-label="Units"></section>
  <section id="view-timeline" class="view" role="tabpanel" aria-label="Timeline"></section>
  <section id="view-glossary" class="view" role="tabpanel" aria-label="Glossary"></section>
  <section id="view-skills" class="view" role="tabpanel" aria-label="Skills"></section>
  <section id="view-quiz" class="view" role="tabpanel" aria-label="Practice and Tests"></section>
  <section id="view-resources" class="view" role="tabpanel" aria-label="Resources"></section>
</main>

<script>
/* =====================================================================
   EDITABLE CONTENT DATA
   Teachers and students: everything the app displays lives in the
   objects below. You can add, remove, or edit any entry — just keep
   the same structure (commas, quotes, brackets) and refresh the page.
   ===================================================================== */

const UNITS = [
{
  id: 1,
  title: "Native Americans, Early Encounters, and Colonial Development",
  years: "Before 1607 – 1750s",
  essentialQuestion: "How did the meeting of Indigenous, European, and African peoples shape colonial America — and colonial New York?",
  bigPicture: "Long before Europeans arrived, Indigenous nations like the Haudenosaunee (Iroquois Confederacy) and the Lenape built complex societies across what is now New York. When Europeans crossed the Atlantic, the Columbian Exchange moved plants, animals, people, and diseases between hemispheres — changing life on both sides forever. The Dutch founded New Netherland (later seized by the English and renamed New York), and thirteen English colonies grew along the coast, each shaped by its geography and economy. From the earliest years, enslaved Africans were forced to labor in the colonies, including in New Amsterdam, planting the roots of American slavery.",
  keyTerms: [
    ["Haudenosaunee (Iroquois Confederacy)", "An alliance of five (later six) Indigenous nations in New York — Mohawk, Oneida, Onondaga, Cayuga, Seneca, and later Tuscarora — who governed together under the Great Law of Peace."],
    ["Lenape", "The Indigenous people who lived in the area of present-day New York City and the lower Hudson Valley when Europeans arrived."],
    ["wampum", "Beads made from shells that Indigenous nations of the Northeast used to record agreements, tell history, and mark important events."],
    ["Columbian Exchange", "The massive transfer of plants, animals, people, ideas, and diseases between the Americas, Europe, and Africa after 1492."],
    ["colony", "A settlement ruled by a distant 'parent' country. The parent country usually took the colony's resources and controlled its trade."],
    ["New Netherland", "The Dutch colony centered on the Hudson River; its main town, New Amsterdam, became New York City when the English took over in 1664."],
    ["patroon system", "A Dutch plan that gave huge pieces of Hudson Valley land to wealthy men (patroons) who promised to bring settlers over."],
    ["mercantilism", "The idea that colonies exist to make the parent country rich — sell it raw materials, buy its finished goods."],
    ["indentured servant", "A person who agreed to work for a set number of years (often 4–7) in exchange for passage to the colonies."],
    ["Middle Passage", "The horrific forced voyage of enslaved Africans across the Atlantic Ocean to the Americas."],
    ["triangular trade", "The three-legged Atlantic trade route linking Europe, Africa, and the Americas — including the trade in enslaved people."],
    ["cash crop", "A crop grown mainly to sell for profit, like tobacco or rice, rather than to eat at home."]
  ],
  keyPeople: [
    ["Hiawatha & the Great Peacemaker", "Traditional founders of the Haudenosaunee Confederacy, who united warring nations under the Great Law of Peace."],
    ["Christopher Columbus", "Italian sailor for Spain whose 1492 voyage began lasting contact between Europe and the Americas — and its devastating effects on Indigenous peoples."],
    ["Henry Hudson", "English explorer sailing for the Dutch in 1609; the river he explored now carries his name and drew Dutch settlement to New York."],
    ["Peter Stuyvesant", "Last Dutch governor of New Netherland; surrendered the colony to the English in 1664."],
    ["John Peter Zenger", "New York printer whose 1735 trial for criticizing the governor became an early landmark for freedom of the press."]
  ],
  timeline: [
    ["c. 1100s–1400s", "Haudenosaunee Confederacy forms under the Great Law of Peace."],
    ["1492", "Columbus reaches the Caribbean; the Columbian Exchange begins."],
    ["1607", "Jamestown, Virginia — first permanent English colony — is founded."],
    ["1609", "Henry Hudson sails up the Hudson River for the Dutch."],
    ["1619", "First recorded Africans brought to English Virginia; slavery takes root in the colonies."],
    ["1624–1626", "Dutch establish New Netherland and New Amsterdam on Manhattan."],
    ["1664", "England seizes New Netherland and renames it New York."],
    ["1735", "Zenger trial in New York strikes an early blow for press freedom."]
  ],
  matters: [
    "NYS Connection: The Haudenosaunee Great Law of Peace is one of the world's oldest participatory democracies, and some historians argue it influenced later American ideas about uniting separate governments.",
    "NYS Connection: New York City began as Dutch New Amsterdam — that heritage survives in place names like Brooklyn (Breukelen), Harlem (Haarlem), and the Bronx (Bronck's land).",
    "Why It Matters: Slavery existed in New York from the Dutch era; by the 1700s New York City had one of the largest enslaved populations of any northern city. Understanding this challenges the myth that slavery was only a southern story."
  ]
},
{
  id: 2,

const STORE_KEY = "g7h-history-progress-v1";
function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {modes:{}, unitStats:{}}; }
  catch(e){ return {modes:{}, unitStats:{}}; }
}
function saveProgress(p){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(p)); }catch(e){}
}
let progress = loadProgress();

/* ---------- Tab navigation ---------- */
const tabButtons = $$("nav.tabs button");
function showView(name){
  $$("section.view").forEach(v => v.classList.toggle("active", v.id === "view-"+name));
  tabButtons.forEach(b => {
    const on = b.dataset.view === name;
    b.classList.toggle("active", on);
    b.setAttribute("aria-selected", on ? "true" : "false");
    b.setAttribute("tabindex", on ? "0" : "-1");
  });
  if(name === "home") renderHome();
  window.scrollTo({top:0, behavior:"auto"});
}
tabButtons.forEach((b,i) => {
  b.addEventListener("click", () => showView(b.dataset.view));
  b.addEventListener("keydown", e => {
    if(e.key === "ArrowRight" || e.key === "ArrowLeft"){
      e.preventDefault();
      const dir = e.key === "ArrowRight" ? 1 : -1;
      const next = tabButtons[(i + dir + tabButtons.length) % tabButtons.length];
      next.focus(); showView(next.dataset.view);
    }
  });
});

/* ---------- UNITS ---------- */
function renderUnits(){
  const cards = UNITS.map(u => `
    <article class="card unit-card" data-unit="${u.id}">
      <button class="unit-head" aria-expanded="false" onclick="toggleUnit(this)">
        <span class="unit-num" aria-hidden="true">${u.id}</span>
        <span class="t"><h3>${esc(u.title)}</h3><span class="years">${esc(u.years)}</span></span>
        <span class="chev" aria-hidden="true"></span>
      </button>
      <div class="unit-body">
        <div class="eq"><b>Essential Question:</b> ${esc(u.essentialQuestion)}</div>
        <div class="ub-sec"><h4>The Big Picture</h4><p class="searchable">${esc(u.bigPicture)}</p></div>
        <div class="ub-sec"><h4>Key Terms</h4>
          <ul class="term-list">${u.keyTerms.map(t=>`<li class="searchable"><b>${esc(t[0])}</b> — ${esc(t[1])}</li>`).join("")}</ul>
        </div>
        <div class="ub-sec"><h4>Key People</h4>
          <ul class="people-grid">${u.keyPeople.map(p=>`<li class="searchable"><b>${esc(p[0])}</b>${esc(p[1])}</li>`).join("")}</ul>
        </div>
        <div class="ub-sec"><h4>Key Dates</h4>
          <ul class="mini-tl">${u.timeline.map(d=>`<li class="searchable"><b>${esc(d[0])}</b> — ${esc(d[1])}</li>`).join("")}</ul>
        </div>
        <div class="ub-sec"><h4>Why It Matters / NYS Connection</h4>
          ${u.matters.map(m=>`<div class="matters searchable">${esc(m)}</div>`).join("")}
        </div>
      </div>
    </article>`).join("");
  $("#view-units").innerHTML = `
    <h2 class="page-title">The Five Units</h2>
    <p class="page-intro">Tap a unit to open it. Use the search box to find any term, person, date, or idea across all five units at once.</p>
    <div class="search-wrap">
      <label for="unitSearch" class="hidden">Search all units</label>
      <input class="search" id="unitSearch" type="search" placeholder="Search all units — try &quot;Saratoga&quot;, &quot;canal&quot;, or &quot;compromise&quot;" oninput="filterUnits(this.value)">
      <div class="search-hint" id="unitSearchHint">Searching opens matching units automatically.</div>
    </div>
    ${cards}`;
}
function toggleUnit(btn){
  const card = btn.closest(".unit-card");
  const open = card.classList.toggle("open");
  btn.setAttribute("aria-expanded", open ? "true" : "false");
}
function filterUnits(q){
  q = q.trim().toLowerCase();
  const cards = $$("#view-units .unit-card");
  let hits = 0;
  const re = q ? new RegExp("(?![^<]*>)("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi") : null;
  cards.forEach(card => {
    const items = $$(".searchable", card);
    let cardHit = false;
    items.forEach(el => {
      if(el.dataset.orig === undefined) el.dataset.orig = el.innerHTML; /* remember clean markup once */
      if(!q){
        el.classList.remove("hidden");
        el.innerHTML = el.dataset.orig;
        return;
      }
      const match = el.textContent.toLowerCase().includes(q);
      el.classList.toggle("hidden", !match);
      /* highlight matches without touching HTML tags */
      el.innerHTML = match ? el.dataset.orig.replace(re, "<mark>$1</mark>") : el.dataset.orig;
      if(match) cardHit = true;
    });
    card.classList.toggle("hidden", q ? !cardHit : false);
    card.classList.toggle("open", q ? cardHit : false);
    $(".unit-head",card).setAttribute("aria-expanded", (q && cardHit) ? "true" : "false");
    if(cardHit) hits++;
  });
  $("#unitSearchHint").textContent = q ? (hits ? hits+" unit(s) contain matches." : "No matches — check your spelling or try a shorter word.") : "Searching opens matching units automatically.";
}

/* ---------- TIMELINE ---------- */
function timelineSortKey(label){
  const m = label.match(/\d{3,4}/g);
  return m ? parseInt(m[0],10) : 0;
}
function renderTimeline(){
  const events = [];
  UNITS.forEach(u => u.timeline.forEach(d => events.push({year:d[0], text:d[1], unit:u.id, key:timelineSortKey(d[0])})));
  events.sort((a,b) => a.key - b.key || a.unit - b.unit);
  $("#view-timeline").innerHTML = `
    <h2 class="page-title">Master Timeline</h2>
    <p class="page-intro">One continuous story, from the founding of the Haudenosaunee Confederacy to the abolition of slavery. The tag shows which unit each event belongs to.</p>
    <div class="card">
      <ul class="timeline">
        ${events.map(e=>`<li><span class="tl-year">${esc(e.year)}</span><span class="tl-unit-tag">UNIT ${e.unit}</span><div class="tl-body">${esc(e.text)}</div></li>`).join("")}
      </ul>
    </div>`;
}

/* ---------- GLOSSARY ---------- */
function renderGlossary(filter=""){
  const all = [];
  UNITS.forEach(u => u.keyTerms.forEach(t => all.push({term:t[0], def:t[1], unit:u.id})));
  all.sort((a,b)=>a.term.toLowerCase().localeCompare(b.term.toLowerCase()));
  const q = filter.trim().toLowerCase();
  const shown = q ? all.filter(t => (t.term+" "+t.def).toLowerCase().includes(q)) : all;
  let html = "", letter = "";
  shown.forEach(t => {
    const L = t.term[0].toUpperCase();
    if(L !== letter && !q){ letter = L; html += `<div class="gloss-letter">${L}</div>`; }
    html += `<div class="gloss-item"><b>${esc(t.term)}</b> — ${esc(t.def)}<span class="src">Unit ${t.unit}</span></div>`;
  });
  $("#view-glossary").innerHTML = `
    <h2 class="page-title">Key Terms Glossary</h2>
    <p class="page-intro">Every vocabulary word from all five units, A to Z. ${all.length} terms and counting.</p>
    <div class="search-wrap">
      <label for="glossSearch" class="hidden">Search glossary</label>
      <input class="search" id="glossSearch" type="search" placeholder="Search ${all.length} terms..." value="${esc(filter)}" oninput="renderGlossary(this.value)">
    </div>
    <div class="card">${html || "<p>No terms match that search.</p>"}</div>`;
  if(filter){ const inp = $("#glossSearch"); inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

/* ---------- QUIZ ENGINE ---------- */
let quiz = null; /* {mode, label, questions, index, correct, answered:[], perUnit:{}} */

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function buildQuiz(mode){
  let qs = [], label = "";
  if(mode === "random"){
    label = "Random Mix (20 questions)";
    qs = shuffle(QUESTIONS).slice(0,20);
  } else if(mode === "final"){
    label = "Practice Final (25 questions)";
    for(let u=1;u<=5;u++) qs = qs.concat(shuffle(QUESTIONS.filter(q=>q.u===u)).slice(0,5));
    qs = shuffle(qs);
  } else {
    const u = parseInt(mode.replace("unit",""),10);
    label = "Unit "+u+" Quiz ("+QUESTIONS.filter(q=>q.u===u).length+" questions)";
    qs = shuffle(QUESTIONS.filter(q=>q.u===u));
  }
  quiz = {mode, label, questions:qs, index:0, correct:0, perUnit:{}, done:false};
  renderQuizQuestion();
}
function renderQuizSetup(){
  const unitModes = UNITS.map(u=>{
    const m = progress.modes["unit"+u.id];
    return `<button class="mode-btn" onclick="buildQuiz('unit${u.id}')">
      <b>Unit ${u.id} Quiz</b><span>${esc(u.title)}${m ? " — best "+Math.round(100*m.best.correct/m.best.total)+"%" : ""}</span></button>`;
  }).join("");
  const fin = progress.modes["final"], rnd = progress.modes["random"];
  const crqHtml = CRQS.map((c,i)=>`
    <div class="card crq-q">
      <div class="eyebrow">Constructed Response — Unit ${c.u}</div>
      <div class="prompt">${esc(c.prompt)}</div>
      <label class="hidden" for="crq${i}">Your answer</label>
      <textarea class="answer-box" id="crq${i}" placeholder="Write your answer here (2-5 sentences), then compare with the model."></textarea>
      <div class="quiz-nav">
        <button class="btn ghost" onclick="document.getElementById('model${i}').classList.toggle('show')">Show / hide model answer</button>
      </div>
      <div class="model" id="model${i}"><b>Model answer:</b> ${esc(c.model)}</div>
    </div>`).join("");
  const dbqHtml = DBQS.map((d,i)=>`
    <div class="card crq-q">
      <div class="eyebrow">DBQ Practice — Unit ${d.u}</div>
      <div class="stimulus"><span class="stype">${esc(d.docTitle)}</span>${esc(d.doc)}</div>
      <ol style="margin:0 0 10px 20px">${d.scaffold.map(s=>`<li style="margin-bottom:6px">${esc(s)}</li>`).join("")}</ol>
      <label class="hidden" for="dbq${i}">Your DBQ response</label>
      <textarea class="answer-box" id="dbq${i}" placeholder="Answer the scaffolded questions, then write a short response using the document AND your outside knowledge."></textarea>
      <div class="quiz-nav">
        <button class="btn ghost" onclick="document.getElementById('dmodel${i}').classList.toggle('show')">Show / hide model response</button>
      </div>
      <div class="model" id="dmodel${i}"><b>Model response:</b> ${esc(d.model)}</div>
    </div>`).join("");
  $("#view-quiz").innerHTML = `
    <h2 class="page-title">Practice &amp; Tests</h2>
    <p class="page-intro">Instant feedback on every question, with an explanation whether you are right or wrong. Scores save automatically on this device.</p>
    <div class="quiz-setup">
      <div class="card">
        <div class="eyebrow">Choose a quiz</div>
        <div class="modes">
          ${unitModes}
          <button class="mode-btn" onclick="buildQuiz('random')"><b>Random Mix</b><span>20 questions from all units${rnd ? " — best "+Math.round(100*rnd.best.correct/rnd.best.total)+"%" : ""}</span></button>
          <button class="mode-btn" onclick="buildQuiz('final')"><b>Practice Final</b><span>25 mixed questions, 5 from each unit${fin ? " — best "+Math.round(100*fin.best.correct/fin.best.total)+"%" : ""}</span></button>
        </div>
        <div class="quiz-nav"><button class="btn danger" onclick="resetProgress()">Reset all saved progress</button></div>
      </div>
      <h2 class="page-title" style="margin-top:24px">Short Answer Practice</h2>
      <p class="page-intro">Write first, then reveal the model. Comparing your answer to a model is one of the fastest ways to improve.</p>
      ${crqHtml}
      <h2 class="page-title" style="margin-top:24px">DBQ Practice</h2>
      <p class="page-intro">One document set per unit. Use the "How to Attack a DBQ" guide in the Skills tab first.</p>
      ${dbqHtml}
      <p class="disclaimer">Note: All questions in this app were written originally for study practice in the style of New York State Regents-format assessments. There is no separate statewide Grade 7 Regents exam; these questions mirror the stimulus-based multiple choice, constructed-response, and DBQ formats students will encounter on later NYS assessments.</p>
    </div>`;
}
function renderQuizQuestion(){
  const q = quiz.questions[quiz.index];
  const stim = q.stim ? `<div class="stimulus"><span class="stype">${esc(q.stim.kind)}</span>${esc(q.stim.text)}</div>` : "";
  $("#view-quiz").innerHTML = `
    <div class="q-progress">
      <span>${esc(quiz.label)}</span>
      <span class="score-pill">Score: ${quiz.correct} / ${quiz.index}</span>
    </div>
    <div class="q-track"><div class="q-track-fill" style="width:${Math.round(100*quiz.index/quiz.questions.length)}%"></div></div>
    <div class="card">
      <div class="eyebrow">Question ${quiz.index+1} of ${quiz.questions.length} — Unit ${q.u}</div>
      ${stim}
      <div class="q-text">${esc(q.q)}</div>
      <div class="choices">
        ${q.c.map((c,i)=>`<button class="choice" data-i="${i}" onclick="answer(${i})"><span class="letter">${["A","B","C","D"][i]}</span><span>${esc(c)}</span></button>`).join("")}
      </div>
      <div class="feedback" id="fb" role="status"></div>
      <div class="quiz-nav">
        <button class="btn hidden" id="nextBtn" onclick="nextQ()">Next question</button>
        <button class="btn ghost" onclick="quitQuiz()">Quit quiz</button>
      </div>
    </div>`;
}
function answer(i){
  const q = quiz.questions[quiz.index];
  const btns = $$("#view-quiz .choice");
  if(btns[0].disabled) return;
  btns.forEach(b=>b.disabled = true);
  const right = i === q.a;
  btns[q.a].classList.add("correct");
  if(!right) btns[i].classList.add("wrong");
  if(right) quiz.correct++;
  quiz.perUnit[q.u] = quiz.perUnit[q.u] || {correct:0,total:0};
  quiz.perUnit[q.u].total++; if(right) quiz.perUnit[q.u].correct++;
  const fb = $("#fb");
  fb.className = "feedback show " + (right ? "good" : "bad");
  fb.innerHTML = `<b>${right ? "Correct." : "Not quite — the answer is "+["A","B","C","D"][q.a]+"."}</b>${esc(q.ex)}`;
  $(".score-pill").textContent = "Score: "+quiz.correct+" / "+(quiz.index+1);
  const nb = $("#nextBtn");
  nb.classList.remove("hidden");
  nb.textContent = quiz.index+1 < quiz.questions.length ? "Next question" : "See results";
  nb.focus();
}
function nextQ(){
  quiz.index++;
  if(quiz.index < quiz.questions.length) renderQuizQuestion();
  else finishQuiz();
}
function quitQuiz(){ quiz = null; renderQuizSetup(); }
function finishQuiz(){
  const total = quiz.questions.length, correct = quiz.correct;
  const pct = Math.round(100*correct/total);
  /* save */
  const m = progress.modes[quiz.mode] || {attempts:0, best:{correct:0,total:total}};
  m.attempts++;
  if(correct/total >= (m.best.correct/m.best.total || 0)) m.best = {correct, total};
  m.last = {correct, total};
  progress.modes[quiz.mode] = m;
  Object.keys(quiz.perUnit).forEach(u=>{
    const s = progress.unitStats[u] || {correct:0,total:0};
    s.correct += quiz.perUnit[u].correct; s.total += quiz.perUnit[u].total;
    progress.unitStats[u] = s;
  });
  saveProgress(progress);
  const review = UNITS.filter(u=>quiz.perUnit[u.id]).map(u=>{
    const s = quiz.perUnit[u.id], p = Math.round(100*s.correct/s.total);
    const ok = p >= 70;
    return `<li><span>Unit ${u.id}: ${esc(u.title)}</span><span class="${ok?"tag-good":"tag-warn"}">${s.correct}/${s.total}${ok?"":" — review this unit"}</span></li>`;
  }).join("");
  const verdict = pct >= 90 ? "Outstanding — honors-level mastery." : pct >= 80 ? "Strong work. Polish the topics below and you are exam-ready." : pct >= 70 ? "Solid foundation. Focus your review on the flagged units." : "Good start — reread the flagged units' Big Picture and Key Terms, then try again.";
  $("#view-quiz").innerHTML = `
    <div class="card" style="text-align:center;padding:32px 20px">
      <div class="eyebrow">${esc(quiz.label)} — Results</div>
      <div class="results-big">${correct} / ${total}</div>
      <p style="font-size:1.3rem;color:var(--gold);font-weight:700;font-family:Georgia,serif">${pct}%</p>
      <p style="max-width:520px;margin:8px auto 0">${verdict}</p>
    </div>
    <div class="card">
      <div class="eyebrow">Breakdown by unit</div>
      <ul class="review-list">${review}</ul>
      <div class="quiz-nav">
        <button class="btn gold" onclick="buildQuiz('${quiz.mode}')">Try again</button>
        <button class="btn" onclick="quitQuiz()">Back to Practice menu</button>
        <button class="btn ghost" onclick="showView('units')">Review the Units</button>
      </div>
    </div>`;
  quiz.done = true;
}
function resetProgress(){
  if(confirm("Erase all saved scores and progress on this device?")){
    progress = {modes:{}, unitStats:{}};
    saveProgress(progress);
    renderQuizSetup();
  }
}

/* ---------- Boot ---------- */
renderHome();
renderUnits();
renderTimeline();
renderGlossary();
renderSkills();
renderQuizSetup();
renderResources();
</script>
